name: Desktop · build & release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'packages/shared/**'
      - '.github/workflows/desktop.yml'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.10.0'
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
            plat: darwin-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macOS (Intel)
            plat: darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x64)
            plat: windows-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux build deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: Install trusted-signing-cli (Windows release only)
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        run: cargo install trusted-signing-cli --locked

      - name: Build & sign
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (only on tag push, only on macOS legs)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          # Windows Azure Trusted Signing
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        with:
          projectPath: apps/desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Artifaq {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}
        id: tauri

      - name: Collect artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: artifaq-${{ matrix.plat }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip.sig

  publish-manifest:
    name: Publish latest.json to R2
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: artifaq-*
          merge-multiple: true

      - name: Build latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: node apps/desktop/scripts/build-latest-json.mjs "$TAG" ./artifacts > latest.json

      - name: Upload assets + manifest to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_RELEASES_BUCKET }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          for f in ./artifacts/**/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            aws s3 cp "$f" "s3://${R2_BUCKET}/${TAG}/${base}" \
              --endpoint-url "$AWS_ENDPOINT_URL" \
              --cache-control "public, max-age=31536000, immutable"
          done
          aws s3 cp latest.json "s3://${R2_BUCKET}/latest.json" \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --content-type "application/json" \
            --cache-control "public, max-age=60"
